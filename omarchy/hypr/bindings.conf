# Application bindings
bindd = SUPER, RETURN, Toggle floating, togglefloating
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Free up SUPER+W (was: close window, already on SUPER+Q)
unbind = SUPER, W

# Custom bindings (migrated from JaKooLit setup)

# SUPER+T: Terminal (was: toggle floating/tiling)
unbind = SUPER, T
bindd = SUPER, T, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"

# SUPER+Q: Close window (was: unbound; Omarchy default is SUPER+W)
bindd = SUPER, Q, Close window, killactive

# SUPER+SHIFT+Q: Force close active window
bindd = SUPER SHIFT, Q, Force close window, exec, hyprctl activewindow -j | jq '.pid' | xargs kill

# SUPER+E: File manager (was: unbound)
bindd = SUPER, E, File manager, exec, uwsm-app -- nautilus --new-window

# SUPER+D: Fake fullscreen (window thinks fullscreen but stays tiled)
bindd = SUPER, D, Fake fullscreen, fullscreen, 1

# SUPER+H/J/K/L: Vim-style focus navigation
# J was: toggle split, K was: show keybindings, L was: toggle layout
unbind = SUPER, J
unbind = SUPER, K
unbind = SUPER, L
bindd = SUPER, H, Focus left, movefocus, l
bindd = SUPER, J, Focus down, movefocus, d
bindd = SUPER, K, Focus up, movefocus, u
bindd = SUPER, L, Focus right, movefocus, r

# SUPER+SHIFT+H/J/K/L: Resize windows
binded = SUPER SHIFT, H, Resize left, resizeactive, -50 0
binded = SUPER SHIFT, J, Resize down, resizeactive, 0 50
binded = SUPER SHIFT, K, Resize up, resizeactive, 0 -50
binded = SUPER SHIFT, L, Resize right, resizeactive, 50 0

# SUPER+CTRL+ALT+L: Lock screen (moved from SUPER+CTRL+L for vim nav)
bindd = SUPER CTRL ALT, L, Lock screen, exec, omarchy-lock-screen

# SUPER+CTRL+ALT+K: Show keybindings (was SUPER+K, moved for vim nav)
bindd = SUPER CTRL ALT, K, Show keybindings, exec, omarchy-menu-keybindings

# SUPER+CTRL+V: Clipboard manager (keep Omarchy default)


# SUPER+. / SUPER+,: Workspace navigation
# Comma was: dismiss notification — moved to SUPER+;
unbind = SUPER, comma
bindd = SUPER, period, Next workspace, workspace, +1
bindd = SUPER, comma, Previous workspace, workspace, -1

# SUPER+;: Dismiss notification (moved from SUPER+,)
bindd = SUPER, semicolon, Dismiss notification, exec, swaync-client --close-latest

# SUPER+U / SUPER+SHIFT+U: Scratchpad (moved from SUPER+S for WezTerm leader)
unbind = SUPER, S
unbind = SUPER ALT, S
bindd = SUPER, U, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER SHIFT, U, Move to scratchpad, movetoworkspacesilent, special:scratchpad

# SUPER+SHIFT+S: Screenshot area select
bindd = SUPER SHIFT, S, Screenshot area, exec, omarchy-cmd-screenshot region

# SUPER+SHIFT+I: Toggle split direction (dwindle)
bindd = SUPER SHIFT, I, Toggle split direction, layoutmsg, togglesplit

# SUPER+CTRL+H/J/K/L: Move windows
# CTRL+L was: Lock system — unbind to avoid conflict
unbind = SUPER CTRL, L
bindd = SUPER CTRL, H, Move window left, movewindow, l
bindd = SUPER CTRL, J, Move window down, movewindow, d
bindd = SUPER CTRL, K, Move window up, movewindow, u
bindd = SUPER CTRL, L, Move window right, movewindow, r
